name: Android Build APK CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          # Gradle Wrapper validation is enabled by default in setup-gradle@v4.
          # The gradle-wrapper.jar matches the official Gradle 9.3.1 release checksum.

      - name: Generate Debug Keystore
        run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: careeros-ai-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "CareerOS AI - Latest Build"
          body: |
            ### Automated Development Build
            This release contains the latest automated build compiled directly from the `main` branch.
            
            **Installation Instructions:**
            1. Download the `app-debug.apk` file from the assets link below.
            2. Open the file on your physical or emulated Android device.
            3. Grant the required permissions if prompted (must allow installation of apps from unknown sources).
            4. Enjoy using **CareerOS AI**!
          draft: false
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
